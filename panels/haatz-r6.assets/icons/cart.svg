<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#000000">
  <!--
    소모품 구매 — 장바구니.

    손잡이(좌상단 갈고리) → 바구니 → 바퀴 둘. 손잡이를 빼면 바구니가 그냥 사다리꼴
    상자로 읽힌다 — 그 갈고리가 '카트' 를 만든다.
  -->
  <!-- 손잡이: 왼쪽 위에서 내려와 바구니 왼쪽 끝에 닿는다 -->
  <path fill="none" stroke="#000000" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"
        d="M1.9 2.9h2.4l1.1 3.2"/>

  <!-- 바구니: 위가 넓고 아래가 좁은 사다리꼴. 안을 비워 담는 곳임을 보인다. -->
  <path fill-rule="evenodd"
        d="M6.1 7.1h15.3l-2.1 8.2a1.6 1.6 0 0 1-1.55 1.2H9.5a1.6 1.6 0 0 1-1.55-1.2zm2.55 2 1.35 5.4h7.1l1.35-5.4z"/>

  <!-- 바퀴 -->
  <circle cx="9.9" cy="20.2" r="1.8"/>
  <circle cx="17.5" cy="20.2" r="1.8"/>
</svg>
