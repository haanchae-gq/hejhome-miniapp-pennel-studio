<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
  <!--
    이산화탄소 — 구름 + 구름 안의 `CO₂` + 구름을 뚫고 내려오는 화살표 3개.

    **구름 바닥선은 화살대가 지나는 자리에서 끊긴다.** 화살표가 구름 위에 덧그려지는
    게 아니라 구름을 뚫고 나온다는 뜻이다. 그래서 바닥선을 하나의 path 로 이을 수 없다 —
    끊긴 네 토막으로 나눠 그리고, 그 틈으로 화살대가 지나간다.

    윤곽 위쪽(어깨/봉우리)은 끊길 일이 없으므로 한 path 로 남긴다. 두 조각의 끝점
    (6.7,15.6) 과 (17.1,15.6) 이 맞물려 닫힌 구름으로 읽힌다.

    화살표는 구름선(1.3)보다 얇다(1.0). 같은 굵기면 세 자루가 구름만큼 무거워져
    아이콘의 주인공이 구름이 아니라 화살표가 된다. 가운데가 길고 좌우가 짧은 것도
    같은 이유 — 셋이 같은 길이면 울타리처럼 읽힌다.

    `CO₂` 글자는 stroke 가 아니라 fill 이다. 1.3 굵기의 획으로 이 크기의 글자를 그리면
    속이 메워져 뭉갠다. 아래첨자는 `<tspan dy>` 로 baseline 을 내리고 크기를 줄여 만든다
    — SVG 에 아래첨자 문법은 없다.

    렌더는 빌드 타임의 resvg 가 한다(scripts/build-icons.js) — 기기 폰트와 무관하게
    PNG 로 구워져 나간다. 빌드가 `#000000` 을 목표색으로 치환하므로 stroke·fill 이
    같은 검정이어야 함께 바뀐다.
  -->

  <!-- 구름 윤곽. **바닥의 직선은 없다** — 좌우 봉우리가 아래로 감기다 멈추고, 그 사이는
       열어 둔다. 가로선을 그으면 구름이 아니라 상자 뚜껑처럼 읽히고, 화살대가 그 선을
       뚫는 그림이 되어 지저분해진다.

       양 끝을 어디서 끊느냐가 관건이다. 더 감으면 윤곽이 바깥 화살대(x=7.7, 16.3)와
       만나 화살표가 구름에 걸린 것처럼 보인다. 그래서 끝점을 그 바깥(≈6.6, ≈17.4)에
       두고 멈춘다 — 열린 아래쪽으로 화살표가 그냥 흘러나온다. -->
  <path d="M6.6 14.9a3.5 3.5 0 0 1-.4-6.26 4.9 4.9 0 0 1 9.3-1.17 4.1 4.1 0 0 1 1.9 7.43" />

  <!-- 화살표 3개. 구름 안(13.6)에서 시작해 바닥선의 틈으로 빠져나간다. -->
  <g stroke-width="1">
    <path d="M7.7 13.6v7" />
    <path d="M6.2 19.1 7.7 20.6l1.5-1.5" />
    <path d="M12 13.6v8" />
    <path d="M10.5 20.1 12 21.6l1.5-1.5" />
    <path d="M16.3 13.6v7" />
    <path d="M14.8 19.1l1.5 1.5 1.5-1.5" />
  </g>

  <!-- CO₂. 화살대 시작점(13.6) 위에 앉힌다. 아래첨자 `2` 의 발끝이 가장 낮으므로
       그것이 화살대에 닿지 않는 높이가 곧 이 baseline 이다. -->
  <text
    x="11.8"
    y="11.2"
    text-anchor="middle"
    stroke="none"
    fill="#000000"
    font-family="Helvetica, Arial, 'Liberation Sans', sans-serif"
    font-size="5.4"
    font-weight="700"
  >CO<tspan font-size="3.8" dy="1.2">2</tspan></text>
</svg>
