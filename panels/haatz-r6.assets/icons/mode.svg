<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#000000">
  <!-- 모드: 2×2 사각형, 우하단만 속이 빈 형태 (실물 도크 글리프) -->
  <rect x="2.6" y="2.6" width="8" height="8" rx="1.5"/>
  <rect x="13.4" y="2.6" width="8" height="8" rx="1.5"/>
  <rect x="2.6" y="13.4" width="8" height="8" rx="1.5"/>
  <!--
    우하단만 속이 빈 사각형.

    **구멍은 바깥 사각형(13.4–21.4, 중심 17.4)의 중심에 온다.** 이전에는 구멍을
    손으로 이어붙인 `a.5` 아크로 그렸는데, 세로 시작점이 가로보다 0.5 아래에서
    출발해 구멍이 그만큼 처져 있었다 — 위 여백 1.9 / 아래 0.9 로 눈에 띄게 어긋났다.

    이제 `evenodd` 로 뚫는다: 바깥 테두리 subpath 뒤에 구멍 subpath 를 잇고, 구멍의
    좌표를 산술로 못 박는다 (14.8 + 5.2/2 = 17.4 → 바깥과 같은 중심). 아크를 손으로
    이어붙이면 같은 실수가 되풀이된다.

    고칠 일이 있으면 **렌더해서 네 벽 두께가 같은지 재 볼 것** — 좌표만 봐서는
    둥근 모서리(rx) 때문에 어긋남이 안 보인다.
  -->
  <path fill-rule="evenodd" d="M14.9 13.4h5a1.5 1.5 0 0 1 1.5 1.5v5a1.5 1.5 0 0 1-1.5 1.5h-5a1.5 1.5 0 0 1-1.5-1.5v-5a1.5 1.5 0 0 1 1.5-1.5zM15.3 14.8a.5.5 0 0 0-.5.5v4.2a.5.5 0 0 0 .5.5h4.2a.5.5 0 0 0 .5-.5v-4.2a.5.5 0 0 0-.5-.5z"/>
</svg>
