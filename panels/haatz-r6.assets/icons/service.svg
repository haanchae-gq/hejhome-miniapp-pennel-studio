<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#000000">
  <!--
    서비스 센터 — 헤드셋 (상담원).

    머리띠는 위쪽만 감는 반원이고, 좌우에 이어패드가 붙는다. 오른쪽 패드에서
    마이크 붐이 뻗어 나온다 — 그 붐이 '전화 받는 사람' 을 '음악 듣는 사람' 과
    가른다. 빼면 그냥 헤드폰이다.
  -->
  <!-- 머리띠: 바깥 호와 안쪽 호를 이어 두께를 만든다 -->
  <path fill-rule="evenodd" d="M12 2.2a9 9 0 0 0-9 9v1.4h2V11.2a7 7 0 0 1 14 0v1.4h2V11.2a9 9 0 0 0-9-9z"/>

  <!-- 이어패드 좌/우 -->
  <rect x="2.6" y="12.2" width="3.6" height="7.2" rx="1.8"/>
  <rect x="17.8" y="12.2" width="3.6" height="7.2" rx="1.8"/>

  <!-- 마이크 붐: 오른쪽 패드 아래로 돌아 나와 입 앞에서 끝난다 -->
  <path fill="none" stroke="#000000" stroke-width="1.6" stroke-linecap="round"
        d="M19.6 19.6v.7a1.9 1.9 0 0 1-1.9 1.9h-2.4"/>
  <circle cx="13.9" cy="22.2" r="1.5"/>
</svg>
